// ── SVG PATH PARSER (potrace relative commands) ──────────────────────────────
function parsePotracePath(d, tx, ty) {
  // tx/ty = funzioni di trasformazione coordinate
  const shape = new THREE.Shape();
  const holes = [];
  let cur = shape;
  let isFirst = true;
  let x = 0, y = 0, sx = 0, sy = 0;

  const tokens = d.replace(/\n/g,' ').trim()
    .replace(/([MmCcLlZz])/g,' $1 ')
    .trim().split(/\s+/).filter(Boolean);

  let i = 0;
  function num() { return parseFloat(tokens[i++]); }

  while (i < tokens.length) {
    const cmd = tokens[i++];
    if (cmd === 'M') {
      x = num(); y = num(); sx = x; sy = y;
      if (isFirst) { cur.moveTo(tx(x), ty(y)); isFirst = false; }
      else {
        cur = new THREE.Path();
        holes.push(cur);
        cur.moveTo(tx(x), ty(y));
      }
    } else if (cmd === 'm') {
      x += num(); y += num(); sx = x; sy = y;
      if (isFirst) { cur.moveTo(tx(x), ty(y)); isFirst = false; }
      else {
        cur = new THREE.Path();
        holes.push(cur);
        cur.moveTo(tx(x), ty(y));
      }
    } else if (cmd === 'c') {
      while (i < tokens.length && !isNaN(+tokens[i])) {
        const dx1=num(),dy1=num(),dx2=num(),dy2=num(),dx=num(),dy=num();
        cur.bezierCurveTo(tx(x+dx1),ty(y+dy1),tx(x+dx2),ty(y+dy2),tx(x+dx),ty(y+dy));
        x+=dx; y+=dy;
      }
    } else if (cmd === 'l') {
      while (i < tokens.length && !isNaN(+tokens[i])) {
        const dx=num(),dy=num();
        cur.lineTo(tx(x+dx),ty(y+dy));
        x+=dx; y+=dy;
      }
    } else if (cmd === 'z' || cmd === 'Z') {
      cur.closePath(); x=sx; y=sy;
    }
  }
  shape.holes = holes;
  return shape;
}

// ── SETUP THREE.JS ────────────────────────────────────────────────────────────
const canvas = document.getElementById('c');
const W = window.innerWidth, H = window.innerHeight;
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(W, H);
renderer.setClearColor(0x000000, 0);
renderer.toneMapping = THREE.ACESFilmicToneMapping;
renderer.toneMappingExposure = 1.2;

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(36, W/H, 0.1, 200);
camera.position.set(0, 0, 7);

// ── ENV MAP (cubeCamera per riflessi) ────────────────────────────────────────
const cubeRT = new THREE.WebGLCubeRenderTarget(512, {
  format: THREE.RGBFormat,
  generateMipmaps: true,
  minFilter: THREE.LinearMipmapLinearFilter,
});
const cubeCamera = new THREE.CubeCamera(0.1, 100, cubeRT);
scene.add(cubeCamera);

// ── LUCI per effetto cromato giallo fluo ─────────────────────────────────────
// Luce principale bianca
const lMain = new THREE.DirectionalLight(0xffffff, 5);
lMain.position.set(3, 5, 5);
scene.add(lMain);

// Luce secondaria giallo-verde
const lSide = new THREE.DirectionalLight(0xffffff, 3);
lSide.position.set(-4, -2, 3);
scene.add(lSide);

// Fill bianco freddo per riflessi metallici
const lFill = new THREE.DirectionalLight(0xffffff, 3);
lFill.position.set(0, 3, -5);
scene.add(lFill);

// Point lights dinamiche
const p1 = new THREE.PointLight(0xffffff, 7, 20);
p1.position.set(2, 3, 4);
scene.add(p1);

const p2 = new THREE.PointLight(0xffffff, 4, 15);

const p3 = new THREE.PointLight(0xffffff, 4, 20);

const p4 = new THREE.PointLight(0xffffff, 3, 20);
p4.position.set(4, -3, 2);
scene.add(p4);

// ── MATERIALE CROMATO GIALLO FLUO ────────────────────────────────────────────
const chromeMat = new THREE.MeshStandardMaterial({
  color: 0x888888,
  metalness: 1.0,
  roughness: 0.08,
  envMap: cubeRT.texture,
  envMapIntensity: 3.0,
  emissive: 0x000000,
  emissiveIntensity: 0,
});

// ── BUILD LOGO SHAPE DAI PATH REALI ──────────────────────────────────────────
// Transform SVG originale: translate(0,892) scale(0.025,-0.025)
// Il path è in coordinate potrace (unità 0.1pt, 4x upscale)
// ViewBox 724×892. Normalizziamo a ~[-1.5, 1.5] per Three.js

// Bounding box approssimativa del logo nel viewBox 724×892:
// logo occupa circa x:80-640, y:30-850 → center≈(362,446)
const CX = 362, CY = 446, SCALE = 320;

function tx(px) {
  // da coordinate SVG viewBox (0-724, 0-892) a Three.js
  // Il transform SVG è: translate(0,892) scale(0.025,-0.025)
  // quindi x_vb = px_potrace * 0.025
  //        y_vb = 892 - py_potrace * 0.025
  // ma noi riceviamo già le coordinate potrace raw
  return (px * 0.025 - CX) / SCALE;
}
function ty(py) {
  return (892 - py * 0.025 - CY) / SCALE;
}

// ── MOUSE / TOUCH ─────────────────────────────────────────────────────────────
let drag=false, lx=0, ly=0, rx=0, ry=0;
canvas.addEventListener('mousedown', e=>{drag=true;lx=e.clientX;ly=e.clientY;});
window.addEventListener('mouseup', ()=>drag=false);
window.addEventListener('mousemove', e=>{
  if(!drag)return;
  ry+=(e.clientX-lx)*0.013; rx+=(e.clientY-ly)*0.008;
  rx=Math.max(-0.8,Math.min(0.8,rx));
  lx=e.clientX;ly=e.clientY;
});
canvas.addEventListener('touchstart',e=>{drag=true;lx=e.touches[0].clientX;ly=e.touches[0].clientY;},{passive:true});
window.addEventListener('touchend',()=>drag=false);
window.addEventListener('touchmove',e=>{
  if(!drag)return;
  ry+=(e.touches[0].clientX-lx)*0.013; rx+=(e.touches[0].clientY-ly)*0.008;
  lx=e.touches[0].clientX;ly=e.touches[0].clientY;
});

// ── LOOP ──────────────────────────────────────────────────────────────────────
let auto=0;
function animate(){
  requestAnimationFrame(animate);
  if(!drag) auto+=0.007;

  // Luci orbitanti per riflessi dinamici
  const t = Date.now()*0.001;
  p1.position.set(Math.cos(t*0.7)*5, Math.sin(t*0.5)*4, 4);
  p3.position.set(Math.cos(t*0.4+2)*4, Math.sin(t*0.6+1)*3, -3);

  group.rotation.y = auto + ry;
  group.rotation.x = Math.PI + rx * 0.5;
  group.position.y = Math.sin(t*0.7)*0.06;

  cubeCamera.update(renderer, scene);
  renderer.render(scene, camera);
}
animate();

window.addEventListener('resize',()=>{
  const w=window.innerWidth,h=window.innerHeight;
  camera.aspect=w/h; camera.updateProjectionMatrix();
  renderer.setSize(w,h);
});
